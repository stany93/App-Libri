<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Libreria Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        #interactive.viewport video { width: 100%; height: auto; border-radius: 12px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <div class="max-w-md mx-auto p-4">

        <section id="view-scanner" class="tab-view">
            <main class="bg-white rounded-2xl shadow-md p-6 text-center mt-4">
                <h1 class="text-2xl font-bold text-gray-800 mb-2">Aggiungi un Libro</h1>
                <p class="text-sm text-gray-500 mb-6">Inquadra il codice a barre sul retro o cercalo a mano</p>

                <div class="relative w-full overflow-hidden bg-black rounded-xl mb-4 hidden" id="container-scanner">
                    <div id="interactive" class="viewport relative w-full"></div>
                    <div class="absolute inset-0 border-2 border-blue-500 opacity-60 pointer-events-none m-auto w-4/5 h-20 rounded-md flex items-center justify-center">
                        <span class="text-[10px] text-blue-500 font-bold bg-black/50 px-2 py-0.5 rounded">INQUADRA IL CODICE A BARRE</span>
                    </div>
                </div>

                <button id="btn-toggle-scan" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-xl shadow transition mb-6">
                    📸 Attiva Scanner Live
                </button>

                <div class="relative flex py-2 items-center mb-6">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase font-bold tracking-wider">oppure</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <div class="flex gap-2 text-left mb-4">
                    <input type="text" id="input-ricerca" placeholder="Titolo, autore o ISBN..." class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-sm">
                    <button id="btn-ricerca" class="bg-gray-800 hover:bg-gray-900 text-white px-5 rounded-xl font-medium text-sm transition">Cerca</button>
                </div>

                <div id="stato-caricamento" class="mt-4 text-sm text-blue-600 font-medium hidden">
                    ⏳ <span id="testo-stato">Inizializzazione...</span>
                </div>
            </main>
        </section>

        <section id="view-conferma" class="tab-view hidden">
            <div class="bg-white rounded-2xl shadow-md p-6 mt-4">
                <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Confermi l'inserimento?</h2>
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-4">
                    <label class="text-xs font-bold text-gray-400 uppercase">Titolo</label>
                    <input type="text" id="conf-titolo" class="w-full bg-transparent border-b border-gray-300 font-bold text-gray-800 text-lg mb-3 focus:outline-none focus:border-blue-500">
                    
                    <label class="text-xs font-bold text-gray-400 uppercase">Autore</label>
                    <input type="text" id="conf-autore" class="w-full bg-transparent border-b border-gray-300 text-gray-700 mb-3 focus:outline-none focus:border-blue-500">
                    
                    <label class="text-xs font-bold text-gray-400 uppercase">Stato di lettura</label>
                    <select id="conf-stato" class="w-full bg-transparent border-b border-gray-300 text-gray-700 mb-3 py-1 focus:outline-none focus:border-blue-500">
                        <option value="Da leggere">📚 Da leggere</option>
                        <option value="In lettura">📖 In lettura</option>
                        <option value="Letto">✅ Letto</option>
                        <option value="Da rileggere">🔄 Da rileggere</option>
                    </select>

                    <label class="text-xs font-bold text-gray-400 uppercase">Le mie riflessioni / Note</label>
                    <textarea id="conf-riflessioni" rows="3" placeholder="Aggiungi un pensiero su questo libro..." class="w-full bg-transparent border-b border-gray-300 text-xs text-gray-600 focus:outline-none focus:border-blue-500 resize-none"></textarea>
                    
                    <p id="conf-isbn" class="text-[10px] text-gray-400 font-mono mt-2"></p>
                </div>
                <div class="flex gap-3">
                    <button id="btn-annulla-salvataggio" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-xl transition">Annulla</button>
                    <button id="btn-conferma-salvataggio" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl shadow transition">Salva Libro</button>
                </div>
            </div>
        </section>

        <section id="view-libreria" class="tab-view hidden">
            <div class="mt-4">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">La Mia Libreria</h2>
                
                <div class="flex gap-1 overflow-x-auto pb-2 mb-4 scrollbar-none text-xs">
                    <button id="filter-all" onclick="filtraLibreria('Tutti')" class="filter-btn bg-blue-600 text-white px-3 py-2 rounded-full font-medium whitespace-nowrap">Tutti</button>
                    <button onclick="filtraLibreria('Da leggere')" class="filter-btn bg-white text-gray-600 border border-gray-200 px-3 py-2 rounded-full font-medium whitespace-nowrap">📚 Da leggere</button>
                    <button onclick="filtraLibreria('In lettura')" class="filter-btn bg-white text-gray-600 border border-gray-200 px-3 py-2 rounded-full font-medium whitespace-nowrap">📖 In lettura</button>
                    <button onclick="filtraLibreria('Letto')" class="filter-btn bg-white text-gray-600 border border-gray-200 px-3 py-2 rounded-full font-medium whitespace-nowrap">✅ Letto</button>
                    <button onclick="filtraLibreria('Da rileggere')" class="filter-btn bg-white text-gray-600 border border-gray-200 px-3 py-2 rounded-full font-medium whitespace-nowrap">🔄 Da rileggere</button>
                </div>

                <div id="lista-libri" class="space-y-4"></div>
            </div>
        </section>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg px-6 py-2 flex justify-around max-w-md mx-auto z-50">
        <button onclick="switchTab('scanner')" id="nav-scanner" class="flex flex-col items-center gap-1 text-blue-600 font-medium text-xs">
            <span class="text-xl">📸</span> Scanner
        </button>
        <button onclick="switchTab('libreria')" id="nav-libreria" class="flex flex-col items-center gap-1 text-gray-400 font-medium text-xs">
            <span class="text-xl">📚</span> Libreria
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARnpN14sxR2I9mEsoHq1tmG8EIrqm_QPY",
            authDomain: "app-libri-35839.firebaseapp.com",
            projectId: "app-libri-35839",
            storageBucket: "app-libri-35839.firebasestorage.app",
            messagingSenderId: "525601289129",
            appId: "1:525601289129:web:394227adea5b459950ab88",
            measurementId: "G-VELZSE9Y66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let libroInSospeso = null;
        let tuttiILibri = [];
        let filtroCorrente = "Tutti";

        const btnToggleScan = document.getElementById('btn-toggle-scan');
        const containerScanner = document.getElementById('container-scanner');
        const inputRicerca = document.getElementById('input-ricerca');
        const btnRicerca = document.getElementById('btn-ricerca');
        const statoCaricamento = document.getElementById('stato-caricamento');
        const testoStato = document.getElementById('testo-stato');
        let isScanning = false;

        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-view').forEach(view => view.classList.add('hidden'));
            document.getElementById('view-conferma').classList.add('hidden');
            
            if(tabName === 'scanner') {
                document.getElementById('view-scanner').classList.remove('hidden');
                document.getElementById('nav-scanner').className = "flex flex-col items-center gap-1 text-blue-600 font-medium text-xs";
                document.getElementById('nav-libreria').className = "flex flex-col items-center gap-1 text-gray-400 font-medium text-xs";
            } else if(tabName === 'libreria') {
                document.getElementById('view-libreria').classList.remove('hidden');
                document.getElementById('nav-libreria').className = "flex flex-col items-center gap-1 text-blue-600 font-medium text-xs";
                document.getElementById('nav-scanner').className = "flex flex-col items-center gap-1 text-gray-400 font-medium text-xs";
                if(isScanning) stopScanner();
                caricaLibreria();
            }
        }

        // --- LOGICA DI FUNZIONAMENTO INTEGRATA ---
        async function preparaConfermaLibro(queryCercata, isIsbn = false) {
            statoCaricamento.classList.remove('hidden');
            testoStato.innerText = "Ricerca dettagli online...";

            libroInSospeso = {
                titolo: "Titolo da verificare",
                autore: "Autore sconosciuto",
                trama: "",
                isbn: isIsbn ? queryCercata : "Non disponibile",
                stato: "Da leggere",
                riflessioni: ""
            };

            try {
                let urlApi = isIsbn ? `https://www.googleapis.com/books/v1/volumes?q=isbn:${queryCercata}` : `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(queryCercata)}&maxResults=1`;
                let rispostaApi = await fetch(urlApi);
                let datiApi = await rispostaApi.json();

                // Fallback intelligente: se la ricerca per campo ISBN fallisce, cerchiamo il numero come testo generico
                if (isIsbn && (!datiApi.items || datiApi.items.length === 0)) {
                    console.log("Ricerca rigida ISBN fallita. Tento il fallback generico per: " + queryCercata);
                    urlApi = `https://www.googleapis.com/books/v1/volumes?q=${queryCercata}&maxResults=1`;
                    rispostaApi = await fetch(urlApi);
                    datiApi = await rispostaApi.json();
                }

                if (datiApi.items && datiApi.items.length > 0) {
                    const volumeInfo = datiApi.items[0].volumeInfo;
                    libroInSospeso.titolo = volumeInfo.title || "Titolo Sconosciuto";
                    libroInSospeso.autore = volumeInfo.authors ? volumeInfo.authors[0] : "Autore Sconosciuto";
                    libroInSospeso.trama = volumeInfo.description || "";
                    if (volumeInfo.industryIdentifiers) libroInSospeso.isbn = volumeInfo.industryIdentifiers[0].identifier;
                }

                document.getElementById('conf-titolo').value = libroInSospeso.titolo;
                document.getElementById('conf-autore').value = libroInSospeso.autore;
                document.getElementById('conf-stato').value = "Da leggere";
                document.getElementById('conf-riflessioni').value = "";
                document.getElementById('conf-isbn').innerText = "ISBN: " + libroInSospeso.isbn;

                document.querySelectorAll('.tab-view').forEach(view => view.classList.add('hidden'));
                document.getElementById('view-conferma').classList.remove('hidden');
                statoCaricamento.classList.add('hidden');

            } catch (error) {
                console.error(error);
                testoStato.innerText = "❌ Errore: " + error.message;
            }
        }

        document.getElementById('btn-conferma-salvataggio').addEventListener('click', async () => {
            if (!libroInSospeso) return;

            libroInSospeso.titolo = document.getElementById('conf-titolo').value.trim();
            libroInSospeso.autore = document.getElementById('conf-autore').value.trim();
            libroInSospeso.stato = document.getElementById('conf-stato').value;
            libroInSospeso.riflessioni = document.getElementById('conf-riflessioni').value.trim();
            libroInSospeso.dataInserimento = new Date();

            try {
                await addDoc(collection(db, "libri"), libroInSospeso);
                libroInSospeso = null;
                switchTab('libreria');
            } catch (e) {
                alert("Errore nel salvataggio: " + e.message);
            }
        });

        document.getElementById('btn-annulla-salvataggio').addEventListener('click', () => {
            libroInSospeso = null;
            switchTab('scanner');
        });

        async function caricaLibreria() {
            const container = document.getElementById('lista-libri');
            container.innerHTML = `<p class="text-center text-sm text-gray-500 py-10">Caricamento libreria...</p>`;
            
            try {
                const q = query(collection(db, "libri"), orderBy("dataInserimento", "desc"));
                const querySnapshot = await getDocs(q);
                tuttiILibri = [];
                
                querySnapshot.forEach((docSnap) => {
                    tuttiILibri.push({ id: docSnap.id, ...docSnap.data() });
                });
                
                renderLibri();
            } catch (e) {
                container.innerHTML = `<p class="text-center text-sm text-red-500 py-10">Errore: ${e.message}</p>`;
            }
        }

        function renderLibri() {
            const container = document.getElementById('lista-libri');
            container.innerHTML = "";
            
            const libriFiltrati = tuttiILibri.filter(l => filtroCorrente === "Tutti" || l.stato === filtroCorrente);
            
            if(libriFiltrati.length === 0) {
                container.innerHTML = `<p class="text-center text-sm text-gray-400 py-10">Nessun libro in questa categoria.</p>`;
                return;
            }

            libriFiltrati.forEach(libro => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-4 relative space-y-2";
                
                let badgeColor = "bg-gray-100 text-gray-600";
                if(libro.stato === "In lettura") badgeColor = "bg-yellow-100 text-yellow-700";
                if(libro.stato === "Letto") badgeColor = "bg-green-100 text-green-700";
                if(libro.stato === "Da rileggere") badgeColor = "bg-purple-100 text-purple-700";

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${badgeColor}">${libro.stato}</span>
                            <h3 class="font-bold text-gray-800 text-base mt-1">${libro.titolo || 'Titolo Sconosciuto'}</h3>
                            <p class="text-xs text-gray-500">${libro.autore || 'Autore Sconosciuto'}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="eliminaLibro('${libro.id}')" class="text-gray-300 hover:text-red-500 text-sm p-1">🗑️</button>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 p-2 rounded-lg border border-gray-50">
                        <label class="text-[9px] font-bold text-gray-400 block uppercase">Le mie riflessioni</label>
                        <textarea id="note-${libro.id}" onchange="aggiornaNota('${libro.id}')" class="w-full bg-transparent text-xs text-gray-600 border-none focus:outline-none focus:ring-1 focus:ring-blue-100 rounded mt-0.5 resize-none" rows="2" placeholder="Scrivi qui i tuoi pensieri...">${libro.riflessioni || ""}</textarea>
                    </div>

                    <div class="flex justify-between items-center pt-1 text-xs">
                        <span class="text-[10px] text-gray-400 font-mono">ISBN: ${libro.isbn || 'N/D'}</span>
                        <select onchange="cambiaStatoLibro('${libro.id}', this.value)" class="text-xs bg-gray-100 text-gray-700 rounded px-2 py-1 border-none focus:ring-1 focus:ring-blue-500">
                            <option value="Da leggere" ${libro.stato === 'Da leggere' ? 'selected' : ''}>📚 Da leggere</option>
                            <option value="In lettura" ${libro.stato === 'In lettura' ? 'selected' : ''}>📖 In lettura</option>
                            <option value="Letto" ${libro.stato === 'Letto' ? 'selected' : ''}>✅ Letto</option>
                            <option value="Da rileggere" ${libro.stato === 'Da rileggere' ? 'selected' : ''}>🔄 Da rileggere</option>
                        </select>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.filtraLibreria = function(stato) {
            filtroCorrente = stato;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn bg-white text-gray-600 border border-gray-200 px-3 py-2 rounded-full font-medium whitespace-nowrap";
            });
            event.target.className = "filter-btn bg-blue-600 text-white px-3 py-2 rounded-full font-medium whitespace-nowrap";
            renderLibri();
        }

        window.cambiaStatoLibro = async function(id, nuovoStato) {
            try {
                const docRef = doc(db, "libri", id);
                await updateDoc(docRef, { stato: nuovoStato });
                const libro = tuttiILibri.find(l => l.id === id);
                if(libro) libro.stato = nuovoStato;
                renderLibri();
            } catch(e) { alert("Errore modifica stato: " + e.message); }
        }

        window.aggiornaNota = async function(id) {
            const nuovaNota = document.getElementById(`note-${id}`).value.trim();
            try {
                const docRef = doc(db, "libri", id);
                await updateDoc(docRef, { riflessioni: nuovaNota });
                const libro = tuttiILibri.find(l => l.id === id);
                if(libro) libro.riflessioni = nuovaNota;
            } catch(e) { alert("Errore salvataggio nota: " + e.message); }
        }

        window.eliminaLibro = async function(id) {
            if(confirm("Vuoi davvero eliminare questo libro dalla tua collezione?")) {
                try {
                    await deleteDoc(doc(db, "libri", id));
                    tuttiILibri = tuttiILibri.filter(l => l.id !== id);
                    renderLibri();
                } catch(e) { alert("Errore eliminazione: " + e.message); }
            }
        }

        function startScanner() {
            containerScanner.classList.remove('hidden');
            statoCaricamento.classList.remove('hidden');
            testoStato.innerText = "Avvio fotocamera...";

            Quagga.init({
                inputStream: {
                    name: "Live", type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { facingMode: "environment", width: { min: 640, ideal: 1280 }, height: { min: 480, ideal: 720 } },
                },
                locator: { patchSize: "medium", halfSample: true },
                decoder: { readers: ["ean_reader"] }
            }, function(err) {
                if (err) { testoStato.innerText = "❌ Errore fotocamera."; return; }
                Quagga.start();
                isScanning = true;
                btnToggleScan.innerText = "🛑 Disattiva Scanner";
                btnToggleScan.classList.replace('bg-blue-600', 'bg-red-600');
                testoStato.innerText = "Scanner attivo. Inquadra il codice.";
            });
        }

        function stopScanner() {
            Quagga.stop(); isScanning = false;
            containerScanner.classList.add('hidden'); statoCaricamento.classList.add('hidden');
            btnToggleScan.innerText = "📸 Attiva Scanner Live";
            btnToggleScan.classList.replace('bg-red-600', 'bg-blue-600');
        }

        btnToggleScan.addEventListener('click', () => isScanning ? stopScanner() : startScanner());

        let lastCode = null, count = 0;
        Quagga.onDetected(function(risultato) {
            if (risultato && risultato.codeResult) {
                const codiceIsbn = risultato.codeResult.code;
                if (codiceIsbn === lastCode) {
                    count++;
                    if (count >= 2) {
                        stopScanner(); lastCode = null; count = 0;
                        preparaConfermaLibro(codiceIsbn, true);
                    }
                } else { lastCode = codiceIsbn; count = 0; }
            }
        });

        btnRicerca.addEventListener('click', function() {
            const testoCercato = inputRicerca.value.trim();
            if (testoCercato.length > 2) {
                if (isScanning) stopScanner();
                preparaConfermaLibro(testoCercato, false);
            }
        });

        inputRicerca.addEventListener('keypress', (e) => { if (e.key === 'Enter') btnRicerca.click(); });
    </script>
</body>
</html>
