<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria Personale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #interactive.viewport video { width: 100%; height: auto; border-radius: 12px; }
        .tab-btn.active { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
        @media (prefers-color-scheme: dark) {
            .tab-btn.active { color: #818cf8; border-bottom: 2px solid #818cf8; }
        }
        .filter-btn.active { background-color: #4f46e5; color: #fff; border-color: #4f46e5; }
        @media (prefers-color-scheme: dark) {
            .filter-btn.active { background-color: #6366f1; color: #fff; border-color: #6366f1; }
        }
        .placeholder-cover {
            background: linear-gradient(135deg, #4f46e5 0%, #c084fc 100%);
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 12px;
            font-size: 11px; font-weight: 600; color: #ffffff; text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-50 min-h-screen pb-24 transition-colors duration-200">

    <div class="max-w-md mx-auto px-6 pt-8">

        <header class="mb-8">
            <h1 class="text-xs font-bold tracking-[0.2em] uppercase text-indigo-600 dark:text-indigo-400 mb-1">Archivio Letterario</h1>
            <div id="header-context">
                <h2 class="text-3xl font-bold tracking-tight">I miei libri</h2>
            </div>
        </header>

        <section id="view-add" class="tab-view">
            <div class="space-y-6">
                <div class="relative w-full overflow-hidden bg-zinc-100 dark:bg-zinc-900 rounded-2xl hidden border border-slate-200 dark:border-zinc-800" id="container-scanner">
                    <div id="interactive" class="viewport relative w-full"></div>
                    <div class="absolute inset-0 border-2 border-indigo-500/50 pointer-events-none m-auto w-4/5 h-32 rounded-xl shadow-lg"></div>
                </div>

                <button id="btn-toggle-scan" class="w-full bg-indigo-600 dark:bg-indigo-500 hover:bg-indigo-700 dark:hover:bg-indigo-600 text-white text-xs font-bold tracking-widest py-5 rounded-xl transition shadow-md shadow-indigo-200 dark:shadow-none uppercase">
                    Avvia Scanner Codice
                </button>

                <div class="flex items-center gap-4 py-2">
                    <div class="h-[1px] bg-slate-200 dark:bg-zinc-800 flex-grow"></div>
                    <span class="text-[10px] font-bold text-slate-300 dark:text-zinc-600 uppercase tracking-widest">oppure</span>
                    <div class="h-[1px] bg-slate-200 dark:bg-zinc-800 flex-grow"></div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest">Ricerca manuale rapida</label>
                    <div class="flex gap-2">
                        <input type="text" id="input-ricerca" placeholder="Titolo, Autore o ISBN..." class="flex-grow bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 px-4 py-4 rounded-xl text-sm focus:ring-1 focus:ring-indigo-500 dark:focus:ring-indigo-400 outline-none transition shadow-sm">
                        <button id="btn-ricerca" class="bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-6 py-4 rounded-xl font-bold text-xs uppercase transition active:scale-95 shadow-sm">Cerca</button>
                    </div>
                </div>

                <div id="stato-caricamento" class="hidden text-center py-4">
                    <span class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest animate-pulse">Gemini sta cercando sul web...</span>
                </div>
            </div>
        </section>

        <section id="view-confirm" class="tab-view hidden">
            <div class="bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 rounded-2xl p-6 space-y-6 shadow-sm">
                <h3 class="text-xl font-bold tracking-tight">Verifica dati</h3>
                
                <div class="flex gap-4">
                    <div id="confirm-cover-container" class="w-24 h-36 rounded-xl overflow-hidden shadow-sm flex-shrink-0 border border-slate-100 dark:border-zinc-800 bg-slate-50 dark:bg-zinc-950">
                        <img id="conf-copertina" class="w-full h-full object-cover hidden" src="" alt="">
                        <div id="conf-placeholder" class="placeholder-cover w-full h-full">Nessuna Immagine</div>
                    </div>
                    <div class="flex-grow space-y-3">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">Titolo</label>
                            <input type="text" id="conf-titolo" class="w-full text-sm font-semibold border-b border-slate-200 dark:border-zinc-800 focus:border-indigo-500 dark:focus:border-indigo-400 bg-transparent outline-none py-1 transition">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">Autore</label>
                            <input type="text" id="conf-autore" class="w-full text-sm border-b border-slate-200 dark:border-zinc-800 focus:border-indigo-500 dark:focus:border-indigo-400 bg-transparent outline-none py-1 text-slate-500 dark:text-zinc-400 transition">
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider block mb-1">Stato Lettura</label>
                        <select id="conf-stato" class="w-full text-sm bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 outline-none text-slate-700 dark:text-zinc-300">
                            <option value="Da leggere">Da leggere</option>
                            <option value="In lettura">In lettura</option>
                            <option value="Letto">Letto</option>
                            <option value="Da rileggere">Da rileggere</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider block mb-1">Riflessioni e note personali</label>
                        <textarea id="conf-riflessioni" rows="3" placeholder="Aggiungi pensieri, citazioni o note..." class="w-full text-sm bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 outline-none resize-none text-slate-700 dark:text-zinc-300 placeholder-slate-400 dark:placeholder-zinc-600 leading-relaxed"></textarea>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button id="btn-annulla-save" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest border border-slate-200 dark:border-zinc-800 rounded-xl transition bg-transparent hover:bg-slate-50 dark:hover:bg-zinc-800">Annulla</button>
                    <button id="btn-conferma-save" class="flex-1 py-4 bg-emerald-600 dark:bg-emerald-500 text-white text-xs font-bold uppercase tracking-widest rounded-xl transition hover:bg-emerald-700 dark:hover:bg-emerald-600 shadow-sm">Salva</button>
                </div>
            </div>
        </section>

        <section id="view-library" class="tab-view hidden">
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterLib('Tutti')" class="filter-btn active px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-zinc-800 whitespace-nowrap bg-white dark:bg-zinc-900 transition">Tutti</button>
                <button onclick="filterLib('In lettura')" class="filter-btn px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-zinc-800 whitespace-nowrap bg-white dark:bg-zinc-900 transition">In lettura</button>
                <button onclick="filterLib('Letto')" class="filter-btn px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-slate-200 dark:border-zinc-800 whitespace-nowrap bg-white dark:bg-zinc-900 transition">Letto</button>
            </div>

            <div class="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-zinc-900 pb-3">
                <p id="counter-libri" class="text-xs text-slate-400 dark:text-zinc-500 font-medium">Caricamento in corso...</p>
                <select onchange="changeOrder(this.value)" class="text-[10px] font-bold uppercase tracking-widest outline-none bg-transparent cursor-pointer border-none text-indigo-600 dark:text-indigo-400">
                    <option value="data">Più recenti</option>
                    <option value="titolo">In ordine alfabetico</option>
                </select>
            </div>

            <div id="lista-libri" class="space-y-6"></div>
        </section>

        <section id="view-stats" class="tab-view hidden">
            <div class="space-y-6">
                <div class="bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 rounded-2xl p-6 grid grid-cols-2 gap-6 shadow-sm">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-1">Totale archivio</p>
                        <p id="stat-totale" class="text-3xl font-bold text-slate-900 dark:text-zinc-50">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-1">Volumi letti</p>
                        <p id="stat-letti" class="text-3xl font-bold text-emerald-600 dark:text-emerald-400">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-1">In lettura</p>
                        <p id="stat-in-corso" class="text-3xl font-bold text-violet-600 dark:text-violet-400">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-1">Tasso lettura</p>
                        <p id="stat-perc" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400">0%</p>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md border-t border-slate-100 dark:border-zinc-800 px-8 py-4 flex justify-between items-center max-w-md mx-auto z-50">
        <button onclick="switchTab('add')" id="nav-add" class="tab-btn active text-[10px] font-bold uppercase tracking-widest py-2 transition">Aggiungi</button>
        <button onclick="switchTab('library')" id="nav-library" class="tab-btn text-[10px] font-bold uppercase tracking-widest py-2 text-slate-300 dark:text-zinc-600 transition">Libreria</button>
        <button onclick="switchTab('stats')" id="nav-stats" class="tab-btn text-[10px] font-bold uppercase tracking-widest py-2 text-slate-300 dark:text-zinc-600 transition">Statistiche</button>
    </nav>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { GoogleGenAI } from "@google/generative-ai";

        const firebaseConfig = {
            apiKey: "AIzaSyARnpN14sxR2I9mEsoHq1tmG8EIrqm_QPY",
            authDomain: "app-libri-35839.firebaseapp.com",
            projectId: "app-libri-35839",
            storageBucket: "app-libri-35839.firebasestorage.app",
            messagingSenderId: "525601289129",
            appId: "1:525601289129:web:394227adea5b459950ab88"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURA LA TUA GEMINI KEY QUI
        const GEMINI_API_KEY = "INSERISCI_QUI_LA_TUA_GEMINI_API_KEY"; 
        const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });

        let currentLibri = [];
        let currentFilter = "Tutti";
        let currentOrder = "data";
        let tempLibro = null;
        let isScanning = false;

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-black', 'dark:text-white'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-slate-300', 'dark:text-zinc-600'));
            
            const titles = { 'add': 'Nuovo Libro', 'library': 'La mia collezione', 'stats': 'Andamento' };
            document.querySelector('h2').innerText = titles[tab];

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active');
            
            if(tab === 'library') loadLibrary();
            if(tab === 'stats') updateStats();
            if(isScanning) stopScan();
        };

        // --- MOTORE DI RICERCA INTELLIGENTE CON GEMINI 2.5 FLASH ---
        async function fetchBook(queryText) {
            document.getElementById('stato-caricamento').classList.remove('hidden');
            const cleanQuery = queryText.replace(/[-\s]/g, '').trim();
            
            try {
                // Inizializziamo il modello Flash abilitando la ricerca sul web (Google Search Grounding)
                const model = ai.getGenerativeModel({ 
                    model: "gemini-2.5-flash",
                    generationConfig: { responseMimeType: "application/json" }
                });

                const prompt = `Cerca sul web le informazioni editoriali relative a questo libro o codice ISBN: "${cleanQuery}".
                Usa lo strumento di ricerca web per trovare i dati reali corretti di edizioni italiane.
                Restituisci unicamente un oggetto JSON strutturato esattamente così, senza testo aggiuntivo:
                {
                  "titolo": "Titolo reale del libro",
                  "autore": "Nome dell'autore",
                  "copertinaUrl": "Un URL pubblico e valido della copertina del libro (es. da amazon o openlibrary), se non lo trovi lascia vuoto"
                }`;

                // Chiamata con gli strumenti di ricerca attivi
                const result = await model.generateContent({
                    contents: [{ role: "user", parts: [{ text: prompt }] }],
                    tools: [{ googleSearch: {} }] 
                });

                const responseText = result.response.text();
                const libroDati = JSON.parse(responseText);

                tempLibro = {
                    titolo: libroDati.titolo || "Titolo non trovato",
                    autore: libroDati.autore || "Autore sconosciuto",
                    isbn: cleanQuery,
                    copertinaUrl: libroDati.copertinaUrl || "",
                    stato: "Da leggere",
                    riflessioni: ""
                };

                // Se Gemini non trova l'immagine, usiamo OpenLibrary come paracadute sul codice numerico
                if (!tempLibro.copertinaUrl && !isNaN(cleanQuery)) {
                    tempLibro.copertinaUrl = `https://covers.openlibrary.org/b/isbn/${cleanQuery}-M.jpg`;
                }

                showConfirm();

            } catch (e) {
                console.error("Errore Gemini, uso il fallback tradizionale locale:", e);
                // Fallback locale rapido in caso di problemi di rete o chiavi API errate
                tempLibro = { titolo: "", autore: "", isbn: cleanQuery, copertinaUrl: !isNaN(cleanQuery) ? `https://covers.openlibrary.org/b/isbn/${cleanQuery}-M.jpg` : "", stato: "Da leggere", riflessioni: "" };
                showConfirm();
            } finally {
                document.getElementById('stato-caricamento').classList.add('hidden');
            }
        }

        function showConfirm() {
            document.getElementById('view-add').classList.add('hidden');
            document.getElementById('view-confirm').classList.remove('hidden');
            
            document.getElementById('conf-titolo').value = tempLibro.titolo;
            document.getElementById('conf-autore').value = tempLibro.autore;
            document.getElementById('conf-riflessioni').value = "";
            document.getElementById('conf-isbn').innerText = "Riferimento associato: " + tempLibro.isbn;

            const img = document.getElementById('conf-copertina');
            const placeholder = document.getElementById('conf-placeholder');
            
            if(tempLibro.copertinaUrl) {
                img.src = tempLibro.copertinaUrl;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
                placeholder.innerText = tempLibro.titolo || "Nuovo Libro";
            }
        }

        document.getElementById('btn-conferma-save').onclick = async () => {
            tempLibro.titolo = document.getElementById('conf-titolo').value.trim() || "Titolo non inserito";
            tempLibro.autore = document.getElementById('conf-autore').value.trim() || "Autore sconosciuto";
            tempLibro.stato = document.getElementById('conf-stato').value;
            tempLibro.riflessioni = document.getElementById('conf-riflessioni').value.trim();
            tempLibro.createdAt = new Date();

            await addDoc(collection(db, "libri"), tempLibro);
            switchTab('library');
        };

        document.getElementById('btn-annulla-save').onclick = () => switchTab('add');

        async function loadLibrary() {
            const container = document.getElementById('lista-libri');
            container.innerHTML = `<p class="text-center text-xs uppercase tracking-widest text-slate-300 dark:text-zinc-600 py-12">Sincronizzazione...</p>`;
            
            const q = query(collection(db, "libri"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            currentLibri = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLibrary();
        }

        function renderLibrary() {
            const container = document.getElementById('lista-libri');
            container.innerHTML = "";

            let filter = currentFilter;
            let filtered = currentLibri.filter(l => filter === "Tutti" || l.stato === filter);
            
            if(currentOrder === "titolo") {
                filtered.sort((a,b) => a.titolo.localeCompare(b.titolo));
            }

            document.getElementById('counter-libri').innerText = `${filtered.length} volumi`;

            filtered.forEach(libro => {
                const item = document.createElement('div');
                item.className = "flex gap-5 items-start bg-white dark:bg-zinc-900/40 border border-slate-100 dark:border-zinc-900 p-4 rounded-2xl shadow-xs";
                
                const coverContent = libro.copertinaUrl 
                    ? `<img src="${libro.copertinaUrl}" class="w-full h-full object-cover rounded-lg" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden')">
                       <div class="placeholder-cover w-full h-full hidden rounded-lg">${libro.titolo}</div>`
                    : `<div class="placeholder-cover w-full h-full rounded-lg">${libro.titolo}</div>`;

                item.innerHTML = `
                    <div class="w-20 h-28 flex-shrink-0 bg-slate-50 dark:bg-zinc-950 rounded-lg overflow-hidden shadow-xs border border-slate-100 dark:border-zinc-800">
                        ${coverContent}
                    </div>
                    <div class="flex-grow space-y-2 min-w-0">
                        <div class="flex justify-between items-start">
                            <div class="min-w-0">
                                <h4 class="text-sm font-bold truncate pr-4 text-slate-900 dark:text-zinc-50">${libro.titolo}</h4>
                                <p class="text-xs text-slate-400 dark:text-zinc-500 truncate mt-0.5">${libro.autore}</p>
                            </div>
                            <button onclick="deleteLib('${libro.id}')" class="text-slate-300 dark:text-zinc-700 hover:text-rose-500 dark:hover:text-rose-400 transition p-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        <div class="bg-slate-50 dark:bg-zinc-950 p-2 rounded-xl border border-slate-100 dark:border-zinc-900">
                            <textarea onchange="updateNote('${libro.id}', this.value)" class="w-full bg-transparent text-[11px] text-slate-500 dark:text-zinc-400 border-none outline-none focus:text-slate-900 dark:focus:text-zinc-200 transition resize-none leading-relaxed" rows="2" placeholder="Nessuna nota. Tocca qui per scrivere le tue riflessioni...">${libro.riflessioni || ""}</textarea>
                        </div>
                        <div class="flex justify-between items-center pt-1">
                            <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded ${libro.stato === 'Letto' ? 'bg-emerald-50 dark:bg-emerald-950/20 text-emerald-700 dark:text-emerald-400' : libro.stato === 'In lettura' ? 'bg-violet-50 dark:bg-violet-950/20 text-violet-700 dark:text-violet-400' : 'bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400'}">${libro.stato}</span>
                            <select onchange="updateStatus('${libro.id}', this.value)" class="text-[9px] font-bold uppercase tracking-wider bg-slate-50 dark:bg-zinc-800 rounded-lg px-2 py-1.5 outline-none border-none cursor-pointer text-slate-600 dark:text-zinc-300">
                                <option value="Da leggere" ${libro.stato === 'Da leggere' ? 'selected' : ''}>Da leggere</option>
                                <option value="In lettura" ${libro.stato === 'In lettura' ? 'selected' : ''}>In lettura</option>
                                <option value="Letto" ${libro.stato === 'Letto' ? 'selected' : ''}>Letto</option>
                                <option value="Da rileggere" ${libro.stato === 'Da rileggere' ? 'selected' : ''}>Da rileggere</option>
                            </select>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.filterLib = (f) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.toLowerCase() === f.toLowerCase() || (f === "Tutti" && b.innerText === "TUTTI")) b.classList.add('active');
            });
            renderLibrary();
        };

        window.changeOrder = (o) => { currentOrder = o; renderLibrary(); };
        window.updateNote = async (id, val) => { await updateDoc(doc(db, "libri", id), { riflessioni: val }); };
        window.updateStatus = async (id, val) => { await updateDoc(doc(db, "libri", id), { stato: val }); loadLibrary(); };
        window.deleteLib = async (id) => { if(confirm("Rimuovere definitivamente il volume?")) { await deleteDoc(doc(db, "libri", id)); loadLibrary(); } };

        function updateStats() {
            const totale = currentLibri.length;
            const letti = currentLibri.filter(l => l.stato === "Letto").length;
            const inCorso = currentLibri.filter(l => l.stato === "In lettura").length;
            const perc = totale > 0 ? Math.round((letti / totale) * 100) : 0;

            document.getElementById('stat-totale').innerText = totale;
            document.getElementById('stat-letti').innerText = letti;
            document.getElementById('stat-in-corso').innerText = inCorso;
            document.getElementById('stat-perc').innerText = perc + "%";
        }

        function startScan() {
            document.getElementById('container-scanner').classList.remove('hidden');
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader"] }
            }, (err) => {
                if(err) return;
                Quagga.start();
                isScanning = true;
                document.getElementById('btn-toggle-scan').innerText = "Ferma Scanner";
                document.getElementById('btn-toggle-scan').classList.replace('bg-indigo-600', 'bg-rose-600');
            });
        }

        function stopScan() {
            Quagga.stop();
            isScanning = false;
            document.getElementById('container-scanner').classList.add('hidden');
            document.getElementById('btn-toggle-scan').innerText = "Avvia Scanner Codice";
            document.getElementById('btn-toggle-scan').classList.replace('bg-rose-600', 'bg-indigo-600');
        }

        document.getElementById('btn-toggle-scan').onclick = () => isScanning ? stopScan() : startScan();

        let lastCode = null;
        Quagga.onDetected((res) => {
            const code = res.codeResult.code;
            if(code === lastCode) return;
            lastCode = code;
            stopScan();
            fetchBook(code);
        });

        document.getElementById('btn-ricerca').onclick = () => {
            const q = document.getElementById('input-ricerca').value.trim();
            if(q.length > 2) fetchBook(q);
        };
    </script>
</body>
</html>
