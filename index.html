<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libreria Personale</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
body { font-family: Inter, sans-serif; }
.placeholder-cover {
 background: linear-gradient(135deg,#4f46e5,#c084fc);
 display:flex; align-items:center; justify-content:center;
 color:#fff; font-size:11px; text-transform:uppercase;
}
</style>
</head>

<body class="bg-slate-50 p-6 max-w-md mx-auto">

<h1 class="text-xl font-bold mb-4">📚 Libreria</h1>

<!-- INPUT -->
<div class="space-y-2">
<input id="input-ricerca" class="w-full p-3 border rounded-xl" placeholder="Titolo o autore...">

<!-- RISULTATI LIVE -->
<div id="search-results" class="hidden bg-white border rounded-xl shadow max-h-60 overflow-y-auto"></div>

<button id="btn-ricerca" class="w-full bg-indigo-600 text-white p-3 rounded-xl">
Cerca manuale
</button>
</div>

<hr class="my-6">

<!-- CONFERMA -->
<div id="confirm" class="hidden space-y-3">
<img id="cover" class="w-32 h-44 object-cover rounded-xl">
<div id="placeholder" class="placeholder-cover w-32 h-44 hidden"></div>

<input id="titolo" class="w-full border p-2 rounded">
<input id="autore" class="w-full border p-2 rounded">
<p id="isbn"></p>
</div>

<script>

/* ======================
   UTILS SMARTE
======================*/

function normalize(str=""){
 return str.toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "")
  .replace(/[^\w\s]/g,"")
}

function words(str){
 return normalize(str).split(" ").filter(w=>w.length>2)
}

function score(a,b){
 let s=0
 a=normalize(a); b=normalize(b)
 if(b.includes(a)) s+=70
 if(a===b) s+=100

 let wa=words(a)
 let wb=words(b)

 let match=wa.filter(w=>wb.includes(w)).length
 s += (match/wa.length)*60

 return s
}

function isbnFrom(ids=[]){
 return ids?.find(i=>i.type==="ISBN_13")?.identifier
     || ids?.find(i=>i.type==="ISBN_10")?.identifier
     || ""
}

function gCover(info){
 return info.imageLinks?.thumbnail?.replace("http","https") || ""
}

function openCover(isbn){
 return `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`
}

/* ======================
   AUTOCOMPLETE
======================*/

let timer

document.getElementById("input-ricerca").addEventListener("input", e=>{
 clearTimeout(timer)

 let q=e.target.value.trim()
 if(q.length<3){
  results().classList.add("hidden")
  return
 }

 timer=setTimeout(()=>auto(q),300)
})

function results(){ return document.getElementById("search-results") }

async function auto(q){
 let res=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5`)
 let data=await res.json()

 if(!data.items) return

 let box=results()
 box.innerHTML=""

 data.items.forEach(item=>{
  let info=item.volumeInfo

  let el=document.createElement("div")
  el.className="p-3 border-b cursor-pointer hover:bg-gray-100 flex gap-2"

  el.innerHTML=`
  <img src="${gCover(info)}" class="w-12 h-16 objectray-400">${(info.authors||[]).join(",")}</p>
  </div>`

  el.onclick=()=>selectBook(item)
  box.appendChild(el)
 })

 box.classList.remove("hidden")
}

/* ======================
   MATCH MIGLIORE
======================*/

function best(items,q){
 let top=null, bestScore=-1

 items.forEach(i=>{
  let info=i.volumeInfo
  let t=info.title+" "+(info.subtitle||"")
  let s=score(q,t)

  if(info.imageLinks) s+=20
  if(info.authors) s+=10

  if(s>bestScore){ bestScore=s; top=i }
 })

 return top
}

/* ======================
   FETCH MANUALE
======================*/

async function fetchBook(q){
 let url=`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=10`
 let res=await fetch(url)
 let data=await res.json()

 if(!data.items) return

 selectBook(best(data.items,q))
}

/* ======================
   SELEZIONE LIBRO
======================*/

function selectBook(item){
 let info=item.volumeInfo

 let isbn=isbnFrom(info.industryIdentifiers)
 let cover=gCover(info)

 if(!cover && isbn) cover=openCover(isbn)

 document.getElementById("titolo").value = info.title || ""
 document.getElementById("autore").value = (info.authors||[]).join(",")
 document.getElementById("isbn").innerText = isbn

 let img=document.getElementById("cover")
 let ph=document.getElementById("placeholder")

 if(cover){
  img.src=cover
  img.onerror=()=>{
    img.classList.add("hidden")
    ph.classList.remove("hidden")
    ph.innerText=info.title
  }
  img.classList.remove("hidden")
  ph.classList.add("hidden")
 } else {
  img.classList.add("hidden")
  ph.classList.remove("hidden")
 }

 document.getElementById("confirm").classList.remove("hidden")
 results().classList.add("hidden")
}

/* ======================
   BOTTONE CERCA
======================*/

document.getElementById("btn-ricerca").onclick = ()=>{
 let q=document.getElementById("input-ricerca").value
 if(q.length>2) fetchBook(q)
}

/* CLICK FUORI */
document.addEventListener("click",(e)=>{
 if(!e.target.closest("#input-ricerca"))
  results().classList.add("hidden")
})

</script>
</body>
</html>
