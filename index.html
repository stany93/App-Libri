<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria Personale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #container-scanner { height: 300px; position: relative; }
        #interactive.viewport video, #interactive.viewport canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
        }
        .tab-btn.active { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
        @media (prefers-color-scheme: dark) { .tab-btn.active { color: #818cf8; border-bottom: 2px solid #818cf8; } }
        .filter-btn.active { background-color: #4f46e5; color: #fff; border-color: #4f46e5; }
        .placeholder-cover {
            background: linear-gradient(135deg, #4f46e5 0%, #c084fc 100%);
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 12px;
            font-size: 11px; font-weight: 600; color: #ffffff; text-transform: uppercase;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-50 min-h-screen pb-24 transition-colors duration-200">

    <div class="max-w-md mx-auto px-6 pt-8">
        <header class="mb-8">
            <h1 class="text-xs font-bold tracking-[0.2em] uppercase text-indigo-600 dark:text-indigo-400 mb-1">Archivio Letterario</h1>
            <h2 id="page-title" class="text-3xl font-bold tracking-tight">Nuovo Libro</h2>
        </header>

        <section id="view-add" class="tab-view">
            <div class="space-y-6">
                <div class="relative w-full overflow-hidden bg-zinc-100 dark:bg-zinc-900 rounded-2xl hidden border border-slate-200 dark:border-zinc-800" id="container-scanner">
                    <div id="interactive" class="viewport relative w-full h-full"></div>
                    <div class="absolute inset-0 border-2 border-indigo-500/50 pointer-events-none m-auto w-4/5 h-32 rounded-xl shadow-lg z-10"></div>
                </div>
                <button id="btn-toggle-scan" class="w-full bg-indigo-600 text-white text-xs font-bold tracking-widest py-5 rounded-xl transition shadow-md shadow-indigo-200 dark:shadow-none uppercase">Avvia Scanner</button>
                <div class="flex items-center gap-4 py-2">
                    <div class="h-[1px] bg-slate-200 dark:bg-zinc-800 flex-grow"></div>
                    <span class="text-[10px] font-bold text-slate-300 dark:text-zinc-600 uppercase tracking-widest">oppure</span>
                    <div class="h-[1px] bg-slate-200 dark:bg-zinc-800 flex-grow"></div>
                </div>
                
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest">Inserimento Manuale / Ricerca</label>
                    <div class="space-y-2">
                        <input type="text" id="input-titolo-manuale" placeholder="Titolo del libro..." class="w-full bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 px-4 py-3.5 rounded-xl text-sm outline-none transition shadow-sm">
                        <input type="text" id="input-autore-manuale" placeholder="Autore..." class="w-full bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 px-4 py-3.5 rounded-xl text-sm outline-none transition shadow-sm">
                        <button id="btn-ricerca" class="w-full bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 py-4 rounded-xl font-bold text-xs uppercase transition shadow-sm">Cerca nel database</button>
                    </div>
                </div>

                <div id="stato-caricamento" class="hidden text-center py-4">
                    <span class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest animate-pulse">Ricerca nel database...</span>
                </div>
            </div>
        </section>

        <section id="view-confirm" class="tab-view hidden">
            <div class="bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 rounded-2xl p-6 space-y-6 shadow-sm">
                <h3 class="text-xl font-bold tracking-tight">Verifica dati</h3>
                <div class="flex gap-4">
                    <div id="confirm-cover-container" class="w-24 h-36 rounded-xl overflow-hidden shadow-sm flex-shrink-0 bg-slate-50 dark:bg-zinc-950">
                        <img id="conf-copertina" class="w-full h-full object-cover hidden" src="" alt="">
                        <div id="conf-placeholder" class="placeholder-cover w-full h-full">Nessuna Immagine</div>
                    </div>
                    <div class="flex-grow space-y-3">
                        <input type="text" id="conf-titolo" class="w-full text-sm font-semibold border-b border-slate-200 dark:border-zinc-800 bg-transparent outline-none py-1">
                        <input type="text" id="conf-autore" class="w-full text-sm border-b border-slate-200 dark:border-zinc-800 bg-transparent outline-none py-1 text-slate-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="conf-tipo" class="w-full text-sm bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 outline-none text-slate-700 dark:text-zinc-300">
                        <option value="libreria">Libreria</option>
                        <option value="desideri">Lista Desideri</option>
                    </select>
                    <select id="conf-stato" class="w-full text-sm bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 outline-none text-slate-700 dark:text-zinc-300">
                        <option value="Da leggere">Da leggere</option>
                        <option value="In lettura">In lettura</option>
                        <option value="Letto">Letto</option>
                        <option value="Da rileggere">Da rileggere</option>
                    </select>
                </div>
                <textarea id="conf-riflessioni" rows="3" placeholder="Aggiungi note..." class="w-full text-sm bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 outline-none resize-none text-slate-700 dark:text-zinc-300 leading-relaxed"></textarea>
                <button id="btn-conferma-save" class="w-full py-4 bg-emerald-600 text-white text-xs font-bold uppercase rounded-xl shadow-sm">Salva</button>
            </div>
        </section>
        
        <section id="view-library" class="tab-view hidden space-y-4">
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterLib('Tutti')" class="filter-btn active px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">Tutti</button>
                <button onclick="filterLib('In lettura')" class="filter-btn px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">In lettura</button>
                <button onclick="filterLib('Letto')" class="filter-btn px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">Letto</button>
                <button onclick="filterLib('Da rileggere')" class="filter-btn px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">Da rileggere</button>
            </div>
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-zinc-900 pb-3 gap-2">
                <p id="counter-libri" class="text-xs text-slate-400 font-medium flex-grow">Caricamento...</p>
                <select onchange="changeRatingFilter(this.value)" class="text-[10px] font-bold uppercase tracking-widest outline-none bg-transparent text-amber-500 cursor-pointer">
                    <option value="all">Tutti i voti</option>
                    <option value="5">5 Stelle</option>
                    <option value="4">4 Stelle</option>
                    <option value="3">3 Stelle</option>
                    <option value="2">2 Stelle</option>
                    <option value="1">1 Stella</option>
                    <option value="0">Nessun voto</option>
                </select>
                <select onchange="changeOrder(this.value)" class="text-[10px] font-bold uppercase tracking-widest outline-none bg-transparent text-indigo-600 cursor-pointer">
                    <option value="data">Più recenti</option>
                    <option value="titolo">In ordine alfabetico</option>
                </select>
            </div>
            <div id="lista-libri" class="space-y-6"></div>
        </section>

        <section id="view-wishlist" class="tab-view hidden">
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 dark:border-zinc-900 pb-3">
                <p id="counter-desideri" class="text-xs text-slate-400 font-medium">Caricamento...</p>
            </div>
            <div id="lista-desideri" class="space-y-6"></div>
        </section>

        <section id="view-stats" class="tab-view hidden space-y-6">
            <div class="bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 rounded-2xl p-6 grid grid-cols-2 gap-6 shadow-sm">
                <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Totale in libreria</p><p id="stat-totale" class="text-3xl font-bold">0</p></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Volumi letti</p><p id="stat-letti" class="text-3xl font-bold text-emerald-600">0</p></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">In lettura</p><p id="stat-in-corso" class="text-3xl font-bold text-violet-600">0</p></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tasso lettura</p><p id="stat-perc" class="text-3xl font-bold text-indigo-600">0%</p></div>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md border-t border-slate-100 dark:border-zinc-800 px-4 py-4 flex justify-between items-center max-w-md mx-auto z-50">
        <button onclick="switchTab('add')" id="nav-add" class="tab-btn active text-[10px] font-bold uppercase tracking-widest py-2 flex-1 text-center">Aggiungi</button>
        <button onclick="switchTab('library')" id="nav-library" class="tab-btn text-[10px] font-bold uppercase tracking-widest py-2 text-slate-400 flex-1 text-center">Libreria</button>
        <button onclick="switchTab('wishlist')" id="nav-wishlist" class="tab-btn text-[10px] font-bold uppercase tracking-widest py-2 text-slate-400 flex-1 text-center">Desideri</button>
        <button onclick="switchTab('stats')" id="nav-stats" class="tab-btn text-[10px] font-bold uppercase tracking-widest py-2 text-slate-400 flex-1 text-center">Stats</button>
    </nav>

    <div id="modal-conferma-codice" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-slate-900 dark:text-zinc-50 mb-2">Codice rilevato</h3>
            <div class="bg-slate-100 dark:bg-zinc-800 rounded-xl py-4 text-center mb-6">
                <span id="scanned-code-display" class="text-2xl font-mono font-bold tracking-widest text-indigo-600 dark:text-indigo-400"></span>
            </div>
            <div class="flex gap-3">
                <button id="btn-modal-riprova" class="flex-1 py-3 text-xs font-bold uppercase tracking-widest border border-slate-200 dark:border-zinc-700 rounded-xl text-slate-700 dark:text-zinc-300">Riprova</button>
                <button id="btn-modal-cerca" class="flex-1 py-3 bg-indigo-600 text-white text-xs font-bold uppercase rounded-xl">Cerca</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyARnpN14sxR2I9mEsoHq1tmG8EIrqm_QPY", projectId: "app-libri-35839" }));
        
        let currentLibri = [], currentFilter = "Tutti", currentOrder = "data", currentRatingFilter = "all";

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active', 'text-indigo-600', 'dark:text-indigo-400'); b.classList.add('text-slate-400'); });
            const titles = { 'add': 'Nuovo Libro', 'library': 'La mia Libreria', 'wishlist': 'Lista Desideri', 'stats': 'Andamento' };
            document.getElementById('page-title').innerText = titles[tab];
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active');
            if(['library', 'wishlist', 'stats'].includes(tab)) loadData();
        };

        // MOTORE DI RICERCA OTTIMIZZATO PER CAMPI SEPARATI
        window.fetchBook = async (titleOrCode, authorText = "") => {
            document.getElementById('stato-caricamento').classList.remove('hidden');
            const cleanQuery = titleOrCode.trim();
            const isNumeric = /^\d+$/.test(cleanQuery.replace(/[-\s]/g, ''));
            const numericCode = cleanQuery.replace(/[-\s]/g, '');
            
            try {
                let qParam = "";
                if (isNumeric) {
                    qParam = `isbn:${numericCode}`;
                } else {
                    qParam = `intitle:${encodeURIComponent(cleanQuery)}`;
                    if (authorText.trim()) {
                        qParam += `+inauthor:${encodeURIComponent(authorText.trim())}`;
                    }
                }

                let url = `https://www.googleapis.com/books/v1/volumes?q=${qParam}&maxResults=5`;
                let res = await fetch(url);
                let data = await res.json();
                
                if (data.items && data.items.length > 0) {
                    let bestMatch = data.items.find(item => item.volumeInfo && item.volumeInfo.imageLinks && item.volumeInfo.imageLinks.thumbnail) || data.items[0];
                    const info = bestMatch.volumeInfo;
                    
                    window.tempLibro = {
                        titolo: info.title || cleanQuery,
                        autore: info.authors ? info.authors.join(", ") : authorText,
                        isbn: info.industryIdentifiers ? info.industryIdentifiers[0].identifier : (isNumeric ? numericCode : "N/D"),
                        copertinaUrl: info.imageLinks ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail).replace("http://", "https://") : "",
                        tipo: "libreria", stato: "Da leggere", riflessioni: "", valutazione: 0
                    };
                } else {
                    window.tempLibro = { 
                        titolo: isNumeric ? "" : cleanQuery, 
                        autore: authorText || "Autore Ignoto", 
                        isbn: isNumeric ? numericCode : "N/D", 
                        copertinaUrl: isNumeric ? `https://covers.openlibrary.org/b/isbn/${numericCode}-M.jpg` : "", 
                        tipo: "libreria", stato: "Da leggere", riflessioni: "", valutazione: 0 
                    };
                }
                showConfirm();
            } catch (e) {
                console.error(e);
                window.tempLibro = { titolo: isNumeric ? "" : cleanQuery, autore: authorText, isbn: isNumeric ? numericCode : "N/D", copertinaUrl: "", tipo: "libreria", stato: "Da leggere", riflessioni: "", valutazione: 0 };
                showConfirm();
            } finally {
                document.getElementById('stato-caricamento').classList.add('hidden');
            }
        };

        // RECUPERO TARDEVO DELLA COPERTINA (Cover Fetcher dopo il salvataggio)
        window.searchCoverLater = async (id, titolo, autore) => {
            let q = `intitle:${encodeURIComponent(titolo)}`;
            if (autore && autore !== "Autore Ignoto" && autore !== "Autore sconosciuto") {
                q += `+inauthor:${encodeURIComponent(autore)}`;
            }
            try {
                let res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=3`);
                let data = await res.json();
                if (data.items) {
                    let match = data.items.find(i => i.volumeInfo && i.volumeInfo.imageLinks && i.volumeInfo.imageLinks.thumbnail);
                    if (match) {
                        let url = match.volumeInfo.imageLinks.thumbnail.replace("http://", "https://");
                        await updateDoc(doc(db, "libri", id), { copertinaUrl: url });
                        loadData();
                        return;
                    }
                }
                alert("Nessuna immagine speculare trovata nell'archivio cloud.");
            } catch (e) { console.error(e); }
        };

        function showConfirm() {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-confirm').classList.remove('hidden');
            document.getElementById('conf-titolo').value = window.tempLibro.titolo;
            document.getElementById('conf-autore').value = window.tempLibro.autore;
            
            const img = document.getElementById('conf-copertina');
            const placeholder = document.getElementById('conf-placeholder');
            if(window.tempLibro.copertinaUrl) {
                img.src = window.tempLibro.copertinaUrl;
                img.classList.remove('hidden'); placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden'); placeholder.classList.remove('hidden');
                placeholder.innerText = window.tempLibro.titolo || "Nuovo Libro";
            }
        }

        document.getElementById('btn-conferma-save').onclick = async () => {
            window.tempLibro.titolo = document.getElementById('conf-titolo').value.trim();
            window.tempLibro.autore = document.getElementById('conf-autore').value.trim();
            window.tempLibro.tipo = document.getElementById('conf-tipo').value;
            window.tempLibro.stato = document.getElementById('conf-stato').value;
            window.tempLibro.riflessioni = document.getElementById('conf-riflessioni').value.trim();
            window.tempLibro.createdAt = new Date();
            
            await addDoc(collection(db, "libri"), window.tempLibro);
            document.getElementById('input-titolo-manuale').value = '';
            document.getElementById('input-autore-manuale').value = '';
            switchTab(window.tempLibro.tipo === 'desideri' ? 'wishlist' : 'library');
        };

        window.loadData = async () => {
            const q = query(collection(db, "libri"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            currentLibri = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLibrary(); renderWishlist(); updateStats();
        };

        function generateCard(libro, isWishlist) {
            const hasCover = libro.copertinaUrl && libro.copertinaUrl.trim() !== "";
            const coverContent = hasCover 
                ? `<img src="${libro.copertinaUrl}" class="w-full h-full object-cover rounded-lg" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden')"><div class="placeholder-cover w-full h-full hidden rounded-lg">${libro.titolo}</div>`
                : `<div class="placeholder-cover w-full h-full rounded-lg text-[10px] flex flex-col justify-between">${libro.titolo}</div>`;

            // Bottone integrato "Cerca Copertina" se mancante
            const latentSearchBtn = !hasCover 
                ? `<button onclick="searchCoverLater('${libro.id}', '${libro.titolo.replace(/'/g, "\\'")}', '${libro.autore.replace(/'/g, "\\'")}')" class="text-[9px] font-bold uppercase tracking-wider text-indigo-600 dark:text-indigo-400 mt-1 block hover:underline">🔍 Cerca Copertina</button>` 
                : '';

            let val = libro.valutazione || 0;
            let starsHtml = '';
            for(let i=1; i<=5; i++) {
                starsHtml += `<button onclick="updateRating('${libro.id}', ${i})" class="text-base leading-none focus:outline-none transition-transform hover:scale-110 ${val >= i ? 'text-amber-400' : 'text-slate-200 dark:text-zinc-700'}">★</button>`;
            }

            const bottomActions = isWishlist 
                ? `<button onclick="moveToLibrary('${libro.id}')" class="w-full mt-2 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest border border-indigo-100 dark:border-indigo-500/20 transition active:scale-95">Sposta in Libreria</button>`
                : `<div class="flex justify-between items-center pt-1 mt-2 border-t border-slate-100 dark:border-zinc-800">
                    <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded ${libro.stato === 'Letto' ? 'bg-emerald-50 text-emerald-700' : libro.stato === 'In lettura' ? 'bg-violet-50 text-violet-700' : 'bg-slate-100 text-slate-500'}">${libro.stato}</span>
                    <select onchange="updateStatus('${libro.id}', this.value)" class="text-[9px] font-bold uppercase tracking-wider bg-slate-50 dark:bg-zinc-800 rounded-lg px-2 py-1.5 outline-none border-none cursor-pointer text-slate-600 dark:text-zinc-300">
                        <option value="Da leggere" ${libro.stato === 'Da leggere' ? 'selected' : ''}>Da leggere</option>
                        <option value="In lettura" ${libro.stato === 'In lettura' ? 'selected' : ''}>In lettura</option>
                        <option value="Letto" ${libro.stato === 'Letto' ? 'selected' : ''}>Letto</option>
                        <option value="Da rileggere" ${libro.stato === 'Da rileggere' ? 'selected' : ''}>Da rileggere</option>
                    </select>
                   </div>`;

            return `
                <div class="flex gap-5 items-start bg-white dark:bg-zinc-900/40 border border-slate-100 dark:border-zinc-900 p-4 rounded-2xl shadow-xs">
                    <div class="w-20 h-28 flex-shrink-0 bg-slate-50 dark:bg-zinc-950 rounded-lg overflow-hidden border border-slate-100 dark:border-zinc-800 relative">
                        ${coverContent}
                    </div>
                    <div class="flex-grow space-y-2 min-w-0">
                        <div class="flex justify-between items-start">
                            <div class="min-w-0">
                                <h4 class="text-sm font-bold truncate pr-4 text-slate-900 dark:text-zinc-50">${libro.titolo}</h4>
                                <p class="text-xs text-slate-400 truncate mt-0.5">${libro.autore}</p>
                                ${latentSearchBtn}
                            </div>
                            <button onclick="deleteLib('${libro.id}')" class="text-slate-300 hover:text-rose-500 transition p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        </div>
                        <div class="bg-slate-50 dark:bg-zinc-950 p-2 rounded-xl border border-slate-100 dark:border-zinc-900">
                            <textarea onchange="updateNote('${libro.id}', this.value)" class="w-full bg-transparent text-[11px] text-slate-500 dark:text-zinc-400 border-none outline-none resize-none leading-relaxed" rows="2" placeholder="Tocca qui per scrivere note...">${libro.riflessioni || ""}</textarea>
                        </div>
                        <div class="flex items-center justify-between pt-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-bold uppercase tracking-wider text-slate-400">Valutazione</span>
                                <div class="flex items-center gap-0.5">${starsHtml}</div>
                            </div>
                            <button onclick="updateRating('${libro.id}', 0)" class="w-6 h-6 flex-shrink-0 flex items-center justify-center rounded-full bg-slate-100 dark:bg-zinc-800 text-[9px] font-bold text-slate-400 transition-colors ${val === 0 ? 'opacity-0 pointer-events-none' : 'hover:bg-rose-50 hover:text-rose-500'}">0</button>
                        </div>
                        ${bottomActions}
                    </div>
                </div>
            `;
        }

        window.renderLibrary = () => {
            const container = document.getElementById('lista-libri');
            let filtered = currentLibri.filter(l => (l.tipo === 'libreria' || !l.tipo)).filter(l => currentFilter === "Tutti" || l.stato === currentFilter);
            if (currentRatingFilter !== "all") filtered = filtered.filter(l => (l.valutazione || 0) === parseInt(currentRatingFilter));
            if(currentOrder === "titolo") filtered.sort((a,b) => a.titolo.localeCompare(b.titolo));
            document.getElementById('counter-libri').innerText = `${filtered.length} volumi`;
            container.innerHTML = filtered.map(l => generateCard(l, false)).join('');
        };

        window.renderWishlist = () => {
            const container = document.getElementById('lista-desideri');
            let wishBooks = currentLibri.filter(l => l.tipo === 'desideri');
            document.getElementById('counter-desideri').innerText = `${wishBooks.length} volumi`;
            container.innerHTML = wishBooks.map(l => generateCard(l, true)).join('');
        };

        window.filterLib = (f) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); if(b.innerText.toLowerCase() === f.toLowerCase() || (f === "Tutti" && b.innerText === "TUTTI")) b.classList.add('active'); });
            renderLibrary();
        };

        window.changeRatingFilter = (r) => { currentRatingFilter = r; renderLibrary(); };
        window.changeOrder = (o) => { currentOrder = o; renderLibrary(); };
        window.updateNote = async (id, val) => { await updateDoc(doc(db, "libri", id), { riflessioni: val }); };
        window.updateStatus = async (id, val) => { await updateDoc(doc(db, "libri", id), { stato: val }); loadData(); };
        window.updateRating = async (id, val) => { await updateDoc(doc(db, "libri", id), { valutazione: val }); loadData(); };
        window.deleteLib = async (id) => { if(confirm("Rimuovere il volume?")) { await deleteDoc(doc(db, "libri", id)); loadData(); } };
        window.moveToLibrary = async (id) => { await updateDoc(doc(db, "libri", id), { tipo: 'libreria', stato: 'Da leggere' }); loadData(); };

        function updateStats() {
            let libraryBooks = currentLibri.filter(l => (l.tipo === 'libreria' || !l.tipo));
            const totale = libraryBooks.length, letti = libraryBooks.filter(l => l.stato === "Letto").length, inCorso = libraryBooks.filter(l => l.stato === "In lettura").length;
            document.getElementById('stat-totale').innerText = totale; document.getElementById('stat-letti').innerText = letti;
            document.getElementById('stat-in-corso').innerText = inCorso; document.getElementById('stat-perc').innerText = totale > 0 ? Math.round((letti / totale) * 100) + "%" : "0%";
        }

        // --- SCANNER ---
        document.getElementById('btn-toggle-scan').onclick = () => {
            document.getElementById('container-scanner').classList.toggle('hidden');
            Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } }, decoder: { readers: ["ean_reader"] } }, (e) => { if(!e) Quagga.start(); });
        };
        Quagga.onDetected((res) => { Quagga.stop(); document.getElementById('container-scanner').classList.add('hidden'); fetchBook(res.codeResult.code, ""); });
        
        // INTERCETTAZIONE CAMPI SEPARATI ALL'INVIO
        document.getElementById('btn-ricerca').onclick = () => {
            const t = document.getElementById('input-titolo-manuale').value.trim();
            const a = document.getElementById('input-autore-manuale').value.trim();
            if(t.length > 0 || a.length > 0) fetchBook(t, a);
        };
    </script>
</body>
</html>
