<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Libri</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">

    <main class="w-full max-w-md bg-white rounded-2xl shadow-md p-6 text-center mt-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Aggiungi un Libro</h1>
        <p class="text-sm text-gray-500 mb-6">Scatta una foto alla copertina per estrapolare i dati automaticamente</p>

        <label class="cursor-pointer block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-xl shadow transition duration-200">
            📸 Scatta Foto Copertina
            <input type="file" accept="image/*" capture="environment" id="foto-copertina" class="hidden">
        </label>

        <div id="stato-caricamento" class="mt-4 text-sm text-blue-600 font-medium hidden">Elaborazione immagine in corso...</div>

        <div id="zona-anteprima" class="mt-6 hidden">
            <p class="text-xs text-gray-400 mb-2">Immagine catturata:</p>
            <img id="anteprima-immagine" class="w-full max-h-64 object-cover rounded-lg border border-gray-200 shadow-sm mb-4" src="#" alt="Anteprima">
            
            <div id="info-libro" class="text-left bg-gray-50 p-4 rounded-xl border border-gray-100 hidden">
                <h3 id="res-titolo" class="font-bold text-gray-800 text-lg"></h3>
                <p id="res-autore" class="text-sm text-gray-600 mb-2"></p>
                <p id="res-trama" class="text-xs text-gray-500 line-clamp-3"></p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configurazione di Firebase inserita con le tue chiavi reali
        const firebaseConfig = {
            apiKey: "AIzaSyDE_tS2S36oXv8oZ6Bf0A3WwL9TzXn7Yg",
            authDomain: "app-libri-79679.firebaseapp.com",
            projectId: "app-libri-79679",
            storageBucket: "app-libri-79679.firebasestorage.app",
            messagingSenderId: "1074127909382",
            appId: "1:1074127909382:web:0f5ca1207e449c2ebf91ec"
        };

        // Inizializzazione Firebase e Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Elementi dell'interfaccia
        const inputFoto = document.getElementById('foto-copertina');
        const zonaAnteprima = document.getElementById('zona-anteprima');
        const anteprimaImmagine = document.getElementById('anteprima-immagine');
        const statoCaricamento = document.getElementById('stato-caricamento');
        const infoLibro = document.getElementById('info-libro');

        inputFoto.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                // 1. Mostra l'anteprima locale sul telefono
                anteprimaImmagine.src = URL.createObjectURL(file);
                zonaAnteprima.classList.remove('hidden');
                statoCaricamento.classList.remove('hidden');
                infoLibro.classList.add('hidden');

                try {
                    // Per ora eseguiamo un salvataggio di test su Firestore per verificare la connessione!
                    const libroTest = {
                        titolo: "Libro di Test",
                        autore: "Autore Anonimo",
                        trama: "Se vedi questo record su Firestore, la connessione è riuscita alla perfezione!",
                        dataInserimento: new Date()
                    };

                    // Salviamo il documento nella collezione "libri" su Firestore
                    const docRef = await addDoc(collection(db, "libri"), libroTest);
                    console.log("Documento salvato con ID: ", docRef.id);

                    // Mostriamo i dati simulati sullo schermo del telefono
                    document.getElementById('res-titolo').innerText = libroTest.titolo;
                    document.getElementById('res-autore').innerText = libroTest.autore;
                    document.getElementById('res-trama').innerText = libroTest.trama;
                    
                    statoCaricamento.classList.add('hidden');
                    infoLibro.classList.remove('hidden');

                } catch (error) {
                    console.error("Errore durante il salvataggio:", error);
                    statoCaricamento.innerText = "Errore di connessione al database. Verifica di aver attivato Firestore in modalità test.";
                }
            }
        });
    </script>
</body>
</html>
