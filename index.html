<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria Personale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #container-scanner { height: 300px; position: relative; }
        #interactive.viewport video, #interactive.viewport canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
        }
        .tab-btn.active { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
        @media (prefers-color-scheme: dark) { .tab-btn.active { color: #818cf8; border-bottom: 2px solid #818cf8; } }
        .filter-btn.active { background-color: #4f46e5; color: #fff; border-color: #4f46e5; }
        .placeholder-cover {
            background: linear-gradient(135deg, #4f46e5 0%, #c084fc 100%);
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 12px;
            font-size: 11px; font-weight: 600; color: #ffffff; text-transform: uppercase;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-50 min-h-screen pb-24 transition-colors duration-200">

    <div class="max-w-md mx-auto px-6 pt-8">
        <header class="mb-8">
            <h1 class="text-xs font-bold tracking-[0.2em] uppercase text-indigo-600 dark:text-indigo-400 mb-1">Archivio Letterario</h1>
            <h2 id="page-title" class="text-3xl font-bold tracking-tight">Nuovo Libro</h2>
        </header>

        <section id="view-add" class="tab-view">
            <div class="space-y-6">
                <div class="relative w-full overflow-hidden bg-zinc-100 dark:bg-zinc-900 rounded-2xl hidden border" id="container-scanner">
                    <div id="interactive" class="viewport relative w-full h-full"></div>
                    <div class="absolute inset-0 border-2 border-indigo-500/50 pointer-events-none m-auto w-4/5 h-32 rounded-xl shadow-lg z-10"></div>
                </div>
                <button id="btn-toggle-scan" class="w-full bg-indigo-600 text-white text-xs font-bold tracking-widest py-5 rounded-xl uppercase">Avvia Scanner</button>
                <div class="space-y-3">
                    <input type="text" id="input-ricerca" placeholder="Titolo o Autore..." class="w-full bg-white border px-4 py-4 rounded-xl text-sm outline-none">
                    <button id="btn-ricerca" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold text-xs uppercase">Cerca nel database</button>
                </div>
            </div>
        </section>

        <section id="view-confirm" class="tab-view hidden">
            <div class="bg-white border rounded-2xl p-6 space-y-6 shadow-sm">
                <h3 class="text-xl font-bold">Verifica dati</h3>
                <div class="flex gap-4">
                    <div id="confirm-cover-container" class="w-24 h-36 rounded-xl overflow-hidden bg-slate-50">
                        <img id="conf-copertina" class="w-full h-full object-cover hidden" src="" alt="">
                        <div id="conf-placeholder" class="placeholder-cover w-full h-full">Nessuna Immagine</div>
                    </div>
                    <div class="flex-grow space-y-3">
                        <input type="text" id="conf-titolo" class="w-full text-sm font-semibold border-b outline-none">
                        <input type="text" id="conf-autore" class="w-full text-sm border-b outline-none text-slate-500">
                    </div>
                </div>
                <button id="btn-conferma-save" class="w-full py-4 bg-emerald-600 text-white text-xs font-bold uppercase rounded-xl">Salva</button>
            </div>
        </section>
        
        <section id="view-library" class="tab-view hidden space-y-4">
            <div id="lista-libri" class="space-y-4"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t px-4 py-4 flex justify-between max-w-md mx-auto z-50">
        <button onclick="switchTab('add')" class="tab-btn active p-2 text-[10px] font-bold uppercase">Aggiungi</button>
        <button onclick="switchTab('library')" class="tab-btn p-2 text-[10px] font-bold uppercase">Libreria</button>
        <button onclick="switchTab('stats')" class="tab-btn p-2 text-[10px] font-bold uppercase">Stats</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyARnpN14sxR2I9mEsoHq1tmG8EIrqm_QPY", projectId: "app-libri-35839" }));

        window.switchTab = (t) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + t).classList.remove('hidden');
        };

        window.fetchBook = async (queryText) => {
            try {
                let url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(queryText)}&maxResults=5`;
                let res = await fetch(url);
                let data = await res.json();
                if(data.items) {
                    let match = data.items.find(i => i.volumeInfo.imageLinks) || data.items[0];
                    window.tempLibro = {
                        titolo: match.volumeInfo.title,
                        autore: match.volumeInfo.authors ? match.volumeInfo.authors.join(", ") : "Autore Ignoto",
                        copertinaUrl: match.volumeInfo.imageLinks ? match.volumeInfo.imageLinks.thumbnail.replace("http://", "https://") : ""
                    };
                    document.getElementById('view-add').classList.add('hidden');
                    document.getElementById('view-confirm').classList.remove('hidden');
                    document.getElementById('conf-titolo').value = window.tempLibro.titolo;
                    document.getElementById('conf-autore').value = window.tempLibro.autore;
                    if(window.tempLibro.copertinaUrl) {
                        document.getElementById('conf-copertina').src = window.tempLibro.copertinaUrl;
                        document.getElementById('conf-copertina').classList.remove('hidden');
                        document.getElementById('conf-placeholder').classList.add('hidden');
                    }
                }
            } catch(e) { alert("Errore ricerca"); }
        };

        document.getElementById('btn-ricerca').onclick = () => fetchBook(document.getElementById('input-ricerca').value);
        document.getElementById('btn-conferma-save').onclick = async () => {
            await addDoc(collection(db, "libri"), { 
                titolo: document.getElementById('conf-titolo').value,
                autore: document.getElementById('conf-autore').value,
                copertinaUrl: window.tempLibro.copertinaUrl,
                createdAt: new Date() 
            });
            location.reload();
        };
    </script>
</body>
</html>
